<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Template</title>
</head>
<body style="margin:0; padding:0; font-family: Arial, sans-serif; background-color:#f4f4f4;">

  <!-- Wrapper Table -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f4f4f4">
    <tr>
      <td align="center">

        <!-- Main Container Table -->
        <table width="600" cellpadding="0" cellspacing="0" border="0" bgcolor="#ffffff" style="max-width:600px; width:100%; margin:20px 0;">
          
          <!-- Header -->
          <tr>
            <td align="center" style="padding: 20px; background-color:#2563eb; color:#ffffff;">
              <h1 style="margin:0; font-size:24px;">Company Newsletter</h1>
            </td>
          </tr>

          <!-- Hero / Welcome -->
          <tr>
            <td align="center" style="padding:20px;">
              <h2 style="margin:0 0 10px 0;">Welcome to Our Service!</h2>
              <p style="margin:0 0 20px 0;">We are excited to share the latest updates with you.</p>
              <a href="#" style="display:inline-block; padding:10px 20px; background-color:#2563eb; color:#ffffff; text-decoration:none; border-radius:5px;">Learn More</a>
            </td>
          </tr>

          <!-- Features Section -->
          <tr>
            <td style="padding:20px;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="padding:10px; width:50%; vertical-align:top;">
                    <h3 style="margin:0 0 10px 0;">Updates</h3>
                  </td>
                  <td style="padding:10px; width:50%; vertical-align:top;">
                    <h3 style="margin:0 0 10px 0;">Current vacancies</h3>
                </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding:20px; background-color:#f4f4f4; color:#666666; font-size:12px;">
              <p style="margin:0;">&copy; 2026 Company Name. All rights reserved.</p>
              <p style="margin:0;">1234 Street, City, Country</p>
            </td>
          </tr>

        </table>
        <!-- End Main Container -->

      </td>
    </tr>
  </table>
  <!-- End Wrapper Table -->

</body>
</html>

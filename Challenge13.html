<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>FitTrack App</title>
        <link rel="stylesheet" href="fittrack.css">
      </head>

    <body>

       <!--Sidebar Navigation--> 
       <aside class="sidebar">
        <h2 class="logo">FitTrack</h2>
        <nav>
            <ul>
                <li class="active">Dashboard</li>
                <li>Workouts</li>
                 <li>Nutrition</li>
                 <li>Progress</li>
                 <li>Settings</li>
            </ul>
        </nav>
        </aside>
    
        <!--Main Content-->
        <div class="--Main">

        <!--Top Bar-->
        <header class="topbar">
            <h1>Dashboard</h1>
            <input type="text" placeholder="Search...">
        </header>

        <!-- Dashboard Content -->
    <section class="cards">

      <div class="card">
        <h3>Calories Burned</h3>
        <p class="number">540 kcal</p>
      </div>

      <div class="card">
        <h3>Steps Today</h3>
        <p class="number">7,842</p>
      </div>

      <div class="card">
        <h3>Workout Time</h3>
        <p class="number">42 min</p>
      </div>

    </section>

    <!-- Activity Section -->
    <section class="activity">
      <h2>Your Recent Activity</h2>

      <table>
        <tr>
          <th>Workout</th>
          <th>Duration</th>
          <th>Calories</th>
        </tr>
        <tr>
          <td>Running</td>
          <td>30 min</td>
          <td>260 kcal</td>
        </tr>
        <tr>
          <td>Yoga</td>
          <td>20 min</td>
          <td>85 kcal</td>
        </tr>
        <tr>
          <td>Strength Training</td>
          <td>25 min</td>
          <td>195 kcal</td>
        </tr>
      </table>
    </section>

  </div>

</body>
</html>
